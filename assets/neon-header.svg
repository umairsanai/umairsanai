<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Umair Anwar neon profile header</title>
  <desc id="desc">Animated neon header with glowing text for a GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.46" stop-color="#111827"/>
      <stop offset="1" stop-color="#06121F"/>
    </linearGradient>

    <linearGradient id="neon" x1="120" y1="0" x2="780" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.36" stop-color="#A855F7"/>
      <stop offset="0.68" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#00E5FF"/>
      <animate attributeName="x1" values="-180;120;-180" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="720;1080;720" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-80%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00E5FF" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#A855F7" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#22C55E" flood-opacity="0.45"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <style>
      .scan { animation: scan 3.8s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .spark { animation: spark 2.6s ease-in-out infinite; transform-origin: center; }
      .spark:nth-of-type(2) { animation-delay: .4s; }
      .spark:nth-of-type(3) { animation-delay: .8s; }
      .spark:nth-of-type(4) { animation-delay: 1.2s; }
      @keyframes scan {
        0%, 100% { transform: translateX(-220px); opacity: .05; }
        45%, 55% { opacity: .6; }
        50% { transform: translateX(220px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: .74; }
        50% { opacity: 1; }
      }
      @keyframes spark {
        0%, 100% { opacity: .22; transform: scale(.8); }
        50% { opacity: 1; transform: scale(1.18); }
      }
    </style>
  </defs>

  <rect width="900" height="240" rx="28" fill="url(#bg)"/>
  <path d="M54 186C162 112 248 219 372 145C496 71 574 160 704 85C772 46 822 50 864 68" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.35"/>
  <path d="M76 54H824" stroke="url(#neon)" stroke-width="1.4" stroke-dasharray="10 12" stroke-opacity="0.5"/>
  <path d="M98 200H802" stroke="url(#neon)" stroke-width="1.4" stroke-dasharray="10 12" stroke-opacity="0.5"/>
  <ellipse class="scan" cx="450" cy="118" rx="188" ry="52" fill="url(#flare)" filter="url(#softGlow)"/>

  <circle class="spark" cx="132" cy="76" r="3" fill="#00E5FF"/>
  <circle class="spark" cx="760" cy="78" r="3.5" fill="#A855F7"/>
  <circle class="spark" cx="212" cy="186" r="3" fill="#22C55E"/>
  <circle class="spark" cx="694" cy="182" r="2.7" fill="#00E5FF"/>

  <text x="450" y="116" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="900" letter-spacing="1.5" fill="url(#neon)" filter="url(#glow)" class="pulse">Umair Anwar</text>
  <text x="450" y="156" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700" fill="#E2E8F0" opacity="0.9">Backend Engineer - Passioante about Low-Level Systems</text>
</svg>
